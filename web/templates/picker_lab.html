<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picker Lab — OpenAver Dev Sandbox</title>

    <!-- Bootstrap icons + Tailwind base + Theme + showcase 樣式（picker 樣式靠 showcase.css 提供） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/pages/showcase.css">
    <link rel="stylesheet" href="/static/css/pages/picker-lab.css">
    <link rel="icon" href="data:,">

    <!-- GSAP + plugins（與 base.html 順序一致） -->
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/gsap.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/Flip.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/Physics2DPlugin.min.js"></script>

    <!-- BurstPicker shared module（49b T4a） -->
    <script defer src="/static/js/shared/burst-picker.js"></script>

    <!-- Picker Lab page state -->
    <script defer src="/static/js/pages/picker-lab.js"></script>

    <!-- Alpine 最後 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="ds-page" style="background:#1a1a1a; min-height:100vh">

<script>
    // Inject mock data globally — picker-lab.js reads on alpine:init
    window.__pickerLabData = {
        mockCandidates: {{ mock_candidates | tojson | safe }},
        currentSource: {{ current_source | tojson | safe }},
        actressName: {{ actress_name | tojson | safe }}
    };
</script>

<div x-data="pickerLabState"
     x-init="init()">

    <!-- ===== Header ===== -->
    <header class="lab-header">
        <h2>🧪 Picker Lab — Phase 1</h2>
        <div class="lab-actress">
            模擬：<strong>{{ actress_name }}</strong>
            · 來源：<span x-text="_pickerCurrentSource || '—'"></span>
            · 候選池：{{ mock_candidates | length }} 張
        </div>
    </header>

    <!-- ===== LIGHTBOX REPLICA ===== -->
    <div class="showcase-lightbox show lab-lightbox-frame">
        <div class="lightbox-content lab-lightbox-content">

            <!-- Cover -->
            <div class="lightbox-cover">
                <img x-ref="coverImg" :src="coverSrc" alt="封面">
                <div class="cover-actions" :data-picker-open="_pickerOpen">
                    <button class="lb-action-btn"
                            @click.stop="openPicker()"
                            data-tooltip="換照片"
                            aria-label="換照片">
                        <i class="bi bi-arrow-clockwise" :class="{ spin: _pickerLoading }"></i>
                    </button>
                </div>
            </div>

            <!-- Metadata replica（精簡版） -->
            <div class="lightbox-metadata actress-lightbox-meta">
                <div class="actress-lb-header">
                    <span class="lb-name">{{ actress_name }}</span>
                </div>
                <div class="lb-actress-core">
                    <span>(模擬 metadata 區 — Phase 1 不顯示真實年齡 / 三圍)</span>
                </div>
            </div>

            <!-- Picker 候選展開區（與 /showcase 完全相同 markup） -->
            <div class="actress-picker-area"
                 x-show="_pickerOpen"
                 @click.stop
                 @click.outside="_pickerOpen && cancelPicker()">

                <div class="picker-current-source"
                     x-show="_pickerCurrentSource">
                    <span x-text="`當前：${_pickerCurrentSource}`"></span>
                </div>

                <div class="picker-candidates-grid" x-ref="pickerGrid">
                    <template x-for="(c, i) in _candidates" :key="i">
                        <div class="picker-candidate-card"
                             @mouseenter="_onPickerHoverIn($el, i)"
                             @mouseleave="_onPickerHoverOut($el, i)"
                             @click.stop="_onPickerSelect(c, i)">
                            <img :src="c.thumb_url" class="picker-candidate-img" loading="lazy" :alt="c.source">
                            <div class="picker-source-badge" x-text="c.source"></div>
                            <div class="picker-tooltip">點擊替換 (Phase 3 後啟用)</div>
                        </div>
                    </template>
                </div>

                <div x-show="_pickerLoading && _candidates.length === 0" class="picker-loading">
                    <span>抓取候選中…</span>
                </div>

                <div x-show="!_pickerLoading && _pickerOpen && _candidates.length === 0" class="picker-empty">
                    <p>目前找不到候選照片</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Lab Controls ===== -->
    <aside class="lab-controls">
        <h3>Lab Controls</h3>
        <button @click="reset()" class="lab-btn lab-btn--primary">🔄 Reset</button>
        <button @click="openPicker()" class="lab-btn">▶ Open Picker</button>
        <hr>
        <label>SSE timing
            <select x-model="lab.sseMode">
                <option value="mixed">mixed (生產模擬)</option>
                <option value="instant">instant (race 重現)</option>
                <option value="slow">slow (1 卡/秒)</option>
            </select>
        </label>
        <label>候選數
            <input type="number" min="1" :max="lab.mockCandidates.length" x-model.number="lab.candidateCount">
        </label>
        <label>雲端延遲 ms
            <input type="number" min="0" max="3000" step="100" x-model.number="lab.cloudDelay">
        </label>
        <label>本機延遲 ms
            <input type="number" min="0" max="500" step="10" x-model.number="lab.localDelay">
        </label>
        <hr>
        <label><input type="checkbox" x-model="lab.injectPostFail"> 注入 POST 失敗 (P3)</label>
        <label><input type="checkbox" x-model="lab.reducedMotion"> 強制 reduced-motion</label>
    </aside>

    <!-- ===== State Inspector ===== -->
    <aside class="lab-inspector">
        <h3>State</h3>
        <pre x-text="_inspectorState()"></pre>
        <h3>Action Log</h3>
        <ul class="lab-log">
            <template x-for="line in lab.log.slice(-12).reverse()" :key="line.t + ':' + line.msg">
                <li><span class="lab-log-t" x-text="line.t + 'ms'"></span> <span x-text="line.msg"></span></li>
            </template>
        </ul>
    </aside>
</div>

</body>
</html>
